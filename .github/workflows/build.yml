name: Build Pythonizer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v1.0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-13
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles nsis,msi'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS DMG
        if: startsWith(matrix.platform, 'macos')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.release_tag || github.ref_name }}
          releaseName: Pythonizer ${{ inputs.release_tag || github.ref_name }}
          releaseBody: |
            ## macOS Installation
            This build is ad-hoc signed (no Apple Developer ID). If macOS blocks the app:
            1. Right-click the app in Applications → **Open** → confirm
            2. Or run: `xattr -d com.apple.quarantine /Applications/Pythonizer.app`

            ## Windows Installation
            Run the NSIS `.exe` installer or the `.msi` package.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --bundles dmg

      - name: Build Windows EXE + MSI
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.release_tag || github.ref_name }}
          releaseName: Pythonizer ${{ inputs.release_tag || github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
